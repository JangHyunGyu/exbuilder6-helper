<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>eXBuilder6 화면 편집기</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="assets/js/app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#design" aria-label="eXBuilder6 화면 편집기">
          <span class="brand-mark" aria-hidden="true">eX6</span>
          <span class="brand-copy">
            <strong>eXBuilder6 화면 편집기</strong>
            <small id="fileSummary">새 화면.clx / 새 화면.js</small>
          </span>
        </a>

        <div class="top-actions">
          <button id="newScreen" class="tool-button" type="button">새 화면</button>
          <label class="tool-button file-action">
            기존 화면 열기
            <input id="clxFile" type="file" accept=".clx,.xml,text/xml" />
          </label>
          <label class="tool-button file-action advanced-only">
            JS 열기
            <input id="jsFile" type="file" accept=".js,text/javascript,text/plain" />
          </label>
          <button id="downloadClx" class="primary-button" type="button">화면 내보내기</button>
          <button id="downloadJs" class="primary-button advanced-only" type="button">JS 내보내기</button>
          <button id="toggleAdvanced" class="tool-button" type="button" aria-pressed="false">고급 보기</button>
        </div>
      </header>

      <main class="ide-workspace">
        <aside class="left-rail" aria-label="프로젝트 탐색">
          <section class="panel">
            <div class="panel-head">
              <h2>추가하기</h2>
            </div>
            <div id="palette" class="palette" aria-label="컴포넌트 추가">
              <button type="button" data-add="output">글자</button>
              <button type="button" data-add="inputbox">입력칸</button>
              <button type="button" data-add="combobox">선택박스</button>
              <button type="button" data-add="dateinput">날짜</button>
              <button type="button" data-add="textarea">긴 글 입력</button>
              <button type="button" data-add="button">버튼</button>
              <button type="button" data-add="grid">목록</button>
              <button type="button" data-add="group" class="advanced-only">영역</button>
            </div>
          </section>

          <section class="panel grow advanced-only">
            <div class="panel-head">
              <h2>화면 구조</h2>
              <button id="deleteNode" class="mini-button danger" type="button">삭제</button>
            </div>
            <div id="treeView" class="tree-view"></div>
          </section>

          <section class="panel advanced-only">
            <div class="panel-head">
              <h2>데이터 모델</h2>
            </div>
            <div id="modelSummary" class="model-summary"></div>
          </section>
        </aside>

        <section class="editor-area" aria-label="화면 편집">
          <div class="editor-toolbar">
            <div class="view-tabs" role="tablist" aria-label="보기 전환">
              <button class="view-tab is-active" type="button" data-view="design">디자인</button>
              <button class="view-tab advanced-only" type="button" data-view="clx">CLX</button>
              <button class="view-tab advanced-only" type="button" data-view="js">JS</button>
            </div>
            <div class="screen-meta">
              <span id="screenSize">1280 x 720</span>
              <span id="selectedSummary">선택 없음</span>
            </div>
          </div>

          <div class="view-pane is-active" data-pane="design">
            <div class="canvas-scroll">
              <div id="designCanvas" class="design-canvas"></div>
            </div>
          </div>

          <div class="view-pane" data-pane="clx">
            <div class="source-toolbar">
              <button id="applyClxSource" class="tool-button" type="button">CLX 소스 적용</button>
            </div>
            <textarea id="clxSource" class="source-editor" spellcheck="false"></textarea>
          </div>

          <div class="view-pane" data-pane="js">
            <div class="source-toolbar">
              <span>JS 이벤트 코드</span>
            </div>
            <textarea id="jsSource" class="source-editor" spellcheck="false"></textarea>
          </div>
        </section>

        <aside class="right-rail" aria-label="속성 편집">
          <section class="panel inspector-panel">
            <div class="panel-head">
              <h2>선택한 항목</h2>
              <span id="nodeType" class="type-pill">없음</span>
            </div>

            <form id="inspector" class="inspector">
              <label>
                <span>이름</span>
                <input data-prop="id" type="text" />
              </label>
              <label>
                <span>화면에 보일 글자</span>
                <input data-prop="value" type="text" />
              </label>
              <label class="advanced-only">
                <span>fieldLabel</span>
                <input data-prop="fieldLabel" type="text" />
              </label>
              <label class="advanced-only">
                <span>class</span>
                <input data-prop="class" type="text" />
              </label>
              <label>
                <span>연결할 데이터 컬럼</span>
                <input data-prop="bindColumn" type="text" />
              </label>
              <div class="field-row">
                <label>
                  <span>위쪽 위치</span>
                  <input data-prop="row" type="number" min="0" />
                </label>
                <label>
                  <span>왼쪽 위치</span>
                  <input data-prop="col" type="number" min="0" />
                </label>
              </div>
              <div class="field-row advanced-only">
                <label>
                  <span>rowspan</span>
                  <input data-prop="rowspan" type="number" min="1" />
                </label>
                <label>
                  <span>colspan</span>
                  <input data-prop="colspan" type="number" min="1" />
                </label>
              </div>
              <div class="field-row">
                <label>
                  <span>너비</span>
                  <input data-prop="width" type="text" />
                </label>
                <label>
                  <span>높이</span>
                  <input data-prop="height" type="text" />
                </label>
              </div>
              <label class="advanced-only">
                <span>datasetid</span>
                <input data-prop="datasetid" type="text" />
              </label>
              <label class="advanced-only">
                <span>클릭 함수</span>
                <input data-prop="handler" type="text" />
              </label>
            </form>

            <div class="quick-move">
              <div class="panel-head small">
                <h2>위치 조정</h2>
              </div>
              <div class="move-pad" aria-label="선택 항목 이동">
                <span></span>
                <button type="button" data-move="up">위</button>
                <span></span>
                <button type="button" data-move="left">왼쪽</button>
                <button type="button" data-move="down">아래</button>
                <button type="button" data-move="right">오른쪽</button>
              </div>
            </div>

            <div id="gridColumnPanel" class="grid-column-panel">
              <div class="panel-head small">
                <h2>목록 컬럼</h2>
                <button id="addGridColumn" class="mini-button" type="button">컬럼 추가</button>
              </div>
              <div id="gridColumnEditor" class="grid-column-editor"></div>
            </div>

            <div class="raw-editor advanced-only">
              <div class="panel-head small">
                <h2>선택 XML</h2>
                <button id="applyRawXml" class="mini-button" type="button">적용</button>
              </div>
              <textarea id="rawXml" spellcheck="false"></textarea>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
